name: build-data

# Regenerates data.json from Open-Meteo once a day and commits it.
# The static site reads only that committed file — the browser makes no live
# API calls, so this is the single writer of the map data.
#
# Loop-safety: this workflow is schedule / manual only. It has NO `push`
# trigger, so the data.json commit it makes cannot retrigger it. The commit
# does trigger a Vercel redeploy (Vercel Git integration), which is the intended
# path for new data to go live — so the commit message deliberately omits
# [skip ci].

on:
  schedule:
    - cron: '30 3 * * *'   # 03:30 UTC daily (~05:30 Europe/Prague in summer)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build data.json
        run: python3 scripts/build_data.py
      - name: Commit if changed
        run: |
          git config user.name  "houbarsky-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "data.json unchanged — nothing to commit"
            exit 0
          fi
          git add data.json
          git commit -m "data: refresh houbařský index from Open-Meteo ($(date -u +%Y-%m-%d))"
          git push
