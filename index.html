<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Houbařský index — kde teď rostou houby</title>
<meta name="description" content="Mapa podmínek pro růst hub v Česku. Počítáno ze srážek, půdní vlhkosti a teplot — ne z pověr.">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --humus:#171a12;        /* forest-floor background */
    --panel:#20241a;
    --panel-edge:#33382a;
    --moss:#8fae57;
    --cap:#e0a83c;          /* chanterelle amber — the "it's good" colour */
    --ink:#e8e6da;
    --ink-dim:#a9a795;
    --ink-faint:#6f6e5f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--humus);color:var(--ink);
    font-family:'Instrument Sans',system-ui,sans-serif;overflow:hidden}
  #map{position:absolute;inset:0}

  /* ---------- floating panel ---------- */
  .panel{
    position:absolute;top:14px;left:14px;z-index:10;
    background:#000;color:#fff;
    border:1px solid #000;border-radius:14px;
    padding:16px 18px 14px;width:360px;max-width:calc(100vw - 28px);
    box-shadow:0 8px 30px rgba(0,0,0,.45);
  }
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:400;
    font-size:1.45rem;line-height:1.05;letter-spacing:-.01em;color:#fff}
  .sub{font-size:.78rem;color:#fff;margin-top:5px;line-height:1.45}

  .days{display:flex;gap:4px;margin-top:13px;flex-wrap:nowrap}
  .day{
    font:500 .72rem 'Instrument Sans',sans-serif;color:#fff;
    background:#333;border:1px solid #333;
    border-radius:8px;padding:5px 4px;cursor:pointer;
    transition:all .15s ease;
    flex:1 1 0;min-width:0;text-align:center;
  }
  .day:hover{background:#444;border-color:#555}
  .day.on{background:#fff;border-color:#fff;color:#000}
  .day small{display:block;font-weight:400;font-size:.6rem;opacity:.75;margin-top:1px}

  .status{margin-top:11px;font-size:.74rem;color:#fff;opacity:.6}
  .status.err{color:#e57a5a;opacity:1}

  /* ---------- legend (inside panel, foldable) ---------- */
  .legend-toggle{
    margin-top:12px;padding:8px 0 0;
    border-top:1px solid #333;
    font-size:.74rem;color:#fff;cursor:pointer;
    display:flex;justify-content:space-between;align-items:center;
    user-select:none;
  }
  .legend-toggle .chev{transition:transform .2s ease;font-size:.8rem;opacity:.75}
  .legend-toggle.open .chev{transform:rotate(180deg)}
  .legend{
    max-height:0;overflow:hidden;
    transition:max-height .25s ease;
    font-size:.72rem;
  }
  .legend.open{max-height:200px;padding-top:6px}
  .legend .row{display:flex;align-items:center;gap:8px;margin:3px 0}
  .legend .sw{width:15px;height:15px;border-radius:4px;flex:none}
  .legend .lbl{color:#fff;opacity:.85}
  .legend .lbl b{opacity:1;font-weight:600}

  /* ---------- popup ---------- */
  .maplibregl-popup-content{
    background:#000;color:#fff;border:1px solid #333;
    border-radius:12px;padding:14px 16px;font-family:'Instrument Sans',sans-serif;
    box-shadow:0 10px 34px rgba(0,0,0,.5);min-width:225px;
  }
  .maplibregl-popup-tip{border-top-color:#000!important;border-bottom-color:#000!important}
  .maplibregl-popup-close-button{color:#fff;opacity:.6;font-size:18px;right:6px;top:4px}
  .maplibregl-popup-close-button:hover{opacity:1;background:transparent}
  .pp-score{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:2rem;line-height:1}
  .pp-verdict{font-weight:600;font-size:.85rem;margin:2px 0 9px;color:#fff}
  .pp-row{display:flex;justify-content:space-between;gap:14px;font-size:.76rem;
    color:rgba(255,255,255,.6);padding:3px 0;border-top:1px solid #333}
  .pp-row b{color:#fff;font-weight:600;white-space:nowrap}

  @media (max-width:560px){
    .panel{width:calc(100vw - 28px);padding:14px 14px 12px}
    .days{gap:3px}
    .day{padding:5px 2px;font-size:.66rem}
    .day small{font-size:.54rem}
    .legend{font-size:.68rem}
  }
  @media (prefers-reduced-motion: reduce){
    .day{transition:none}
  }
</style>
</head>
<body>
<div id="map"></div>

<div class="panel">
  <h1>Houbařský<br>index</h1>
  <div class="sub">Kde v Česku teď rostou houby — počítáno ze srážek posledních 14&nbsp;dní, půdní vlhkosti a teplot. Ne z pověr.</div>
  <div class="days" id="days"></div>
  <div class="status" id="status">Načítám data z Open-Meteo…</div>
  <div class="legend-toggle" id="legendToggle" role="button" tabindex="0" aria-expanded="false" aria-controls="legend">
    <span>Legenda</span><span class="chev">▾</span>
  </div>
  <div class="legend" id="legend">
    <div class="row"><span class="sw" style="background:#c0392b"></span><span class="lbl"><b>0–25</b> Sucho, zůstaň doma</span></div>
    <div class="row"><span class="sw" style="background:#e67e22"></span><span class="lbl"><b>25–50</b> Slabé, spíš procházka</span></div>
    <div class="row"><span class="sw" style="background:#f1c40f"></span><span class="lbl"><b>50–70</b> Slušné podmínky</span></div>
    <div class="row"><span class="sw" style="background:#8bc34a"></span><span class="lbl"><b>70–85</b> Roste!</span></div>
    <div class="row"><span class="sw" style="background:#27ae60"></span><span class="lbl"><b>85+</b> Hřibobraní 🧺</span></div>
  </div>
</div>

<script>
/* ================= grid over ČR ================= */
// simplified ČR border (lon,lat) for point-in-polygon filtering
const CZ = [[12.09,50.25],[12.55,50.40],[13.00,50.50],[13.55,50.72],[14.30,50.88],
[14.30,51.05],[15.00,51.00],[15.28,50.85],[16.00,50.62],[16.20,50.66],[16.45,50.60],
[16.90,50.44],[17.40,50.27],[17.70,50.32],[18.00,50.05],[18.60,49.90],[18.85,49.52],
[18.40,49.40],[18.15,49.10],[17.65,48.85],[17.20,48.87],[16.95,48.62],[16.60,48.78],
[16.10,48.75],[15.00,48.98],[14.70,48.58],[14.05,48.55],[13.50,48.77],[13.00,49.30],
[12.40,49.75],[12.09,50.25]];

function inCZ(lon,lat){
  let inside=false;
  for(let i=0,j=CZ.length-1;i<CZ.length;j=i++){
    const [xi,yi]=CZ[i],[xj,yj]=CZ[j];
    if(((yi>lat)!==(yj>lat)) && (lon < (xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}

// honeycomb grid: pointy-top hexes tile at dx = lonStep, dy = latStep, odd rows shifted dx/2
const LON_STEP=0.21, LAT_STEP=0.135;
const R_LON=LON_STEP/Math.sqrt(3)*1.02, R_LAT=LAT_STEP/1.5*1.02; // hex radii (deg), tiny overlap
const points=[];
{
  let row=0;
  for(let lat=48.55; lat<=51.06; lat+=LAT_STEP, row++){
    const off=(row%2)?LON_STEP/2:0;
    for(let lon=12.05+off; lon<=18.9; lon+=LON_STEP){
      if(inCZ(lon,lat)) points.push({lon:+lon.toFixed(3),lat:+lat.toFixed(3)});
    }
  }
}

function hexCoords(p){
  const c=[];
  for(let k=0;k<6;k++){
    const a=Math.PI/6+k*Math.PI/3;
    c.push([p.lon+R_LON*Math.cos(a), p.lat+R_LAT*Math.sin(a)]);
  }
  c.push(c[0]);
  return [c];
}

/* ================= Open-Meteo fetch ================= */
const PAST=14, FUT=7;
const statusEl=document.getElementById('status');

async function fetchAll(){
  // Cache key includes a grid signature so a change to LON_STEP/LAT_STEP
  // (which changes points.length) forces a refetch instead of returning
  // a stale payload from an earlier deploy.
  const key='hix-g'+points.length+'-'+new Date().toISOString().slice(0,10);
  try{
    const cached=localStorage.getItem(key);
    if(cached){
      const data=JSON.parse(cached);
      if(Array.isArray(data) && data.length===points.length) return data;
      // grid drifted since cache was written — drop and refetch
      localStorage.removeItem(key);
    }
  }catch(e){}

  const CHUNK=100, results=[];
  for(let i=0;i<points.length;i+=CHUNK){
    const chunk=points.slice(i,i+CHUNK);
    statusEl.textContent=`Načítám data z Open-Meteo… ${Math.min(i+CHUNK,points.length)}/${points.length} bodů`;
    const url='https://api.open-meteo.com/v1/forecast'
      +'?latitude='+chunk.map(p=>p.lat).join(',')
      +'&longitude='+chunk.map(p=>p.lon).join(',')
      +'&daily=precipitation_sum,temperature_2m_max,temperature_2m_min'
      +'&hourly=soil_moisture_0_to_7cm'
      +`&past_days=${PAST}&forecast_days=${FUT}&timezone=Europe%2FPrague`;
    const r=await fetch(url);
    if(!r.ok) throw new Error('Open-Meteo '+r.status);
    const j=await r.json();
    results.push(...(Array.isArray(j)?j:[j]));
    await new Promise(res=>setTimeout(res,150)); // be polite
  }
  // compact: keep daily arrays + daily-mean soil moisture
  const compact=results.map(loc=>{
    const sm=loc.hourly.soil_moisture_0_to_7cm||[];
    const days=loc.daily.time.length, smDaily=[];
    for(let d=0;d<days;d++){
      let s=0,n=0;
      for(let h=d*24;h<(d+1)*24 && h<sm.length;h++){ if(sm[h]!=null){s+=sm[h];n++;} }
      smDaily.push(n?s/n:null);
    }
    return {time:loc.daily.time, prcp:loc.daily.precipitation_sum,
            tmax:loc.daily.temperature_2m_max, tmin:loc.daily.temperature_2m_min,
            soil:smDaily};
  });
  try{
    // drop yesterday's cache
    Object.keys(localStorage).filter(k=>k.startsWith('hix-')&&k!==key)
      .forEach(k=>localStorage.removeItem(k));
    localStorage.setItem(key,JSON.stringify(compact));
  }catch(e){}
  return compact;
}

/* ================= scoring ================= */
// lag weight: fruiting follows rain by ~5–10 days
function lagW(lag){
  if(lag<0) return 0;
  if(lag<=2) return .25;
  if(lag<=4) return .65;
  if(lag<=10) return 1.0;
  if(lag<=14) return .45;
  return 0;
}
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));

// score for one location on day index D (0..PAST+FUT-1); "today" = PAST
function score(loc, D){
  // 1) rain trigger — weighted rain over the 14 days before D (forecast rain counts for future D)
  let rain=0;
  for(let d=Math.max(0,D-14); d<=D; d++){
    const p=loc.prcp[d]; if(p!=null) rain+=p*lagW(D-d);
  }
  const rainS=clamp(Math.sqrt(rain/32),0,1); // ~32mm weighted ≈ saturated

  // 2) soil moisture around D (0–7 cm, m³/m³)
  let sm=0,n=0;
  for(let d=Math.max(0,D-1); d<=Math.min(loc.soil.length-1,D); d++){
    if(loc.soil[d]!=null){sm+=loc.soil[d];n++;}
  }
  sm=n?sm/n:0.18;
  const soilS=clamp((sm-0.13)/(0.30-0.13),0,1);

  // 3) temperature D-2..D — sweet spot 11–19 °C mean
  let tm=0,tn=0,frost=false,heat=false;
  for(let d=Math.max(0,D-2); d<=D; d++){
    if(loc.tmax[d]!=null&&loc.tmin[d]!=null){
      tm+=(loc.tmax[d]+loc.tmin[d])/2; tn++;
      if(loc.tmin[d]<0.5) frost=true;
      if(loc.tmax[d]>29) heat=true;
    }
  }
  tm=tn?tm/tn:14;
  let tempS;
  if(tm>=11&&tm<=19) tempS=1;
  else if(tm<11) tempS=clamp((tm-3)/8,0,1);
  else tempS=clamp((27-tm)/8,0,1);

  let s=100*(0.45*rainS+0.35*soilS+0.20*tempS);
  if(frost) s*=0.5;
  if(heat)  s*=0.8;
  // dry snap: nothing fell in last 3 days and it's hot → surface dries out
  let dry3=0;
  for(let d=Math.max(0,D-2);d<=D;d++) dry3+=loc.prcp[d]||0;
  if(dry3<0.5 && tm>22) s*=0.85;

  return {s:Math.round(clamp(s,0,100)), rain:Math.round(rain), sm, tm:Math.round(tm*10)/10};
}

function verdict(s){
  if(s>=85) return 'Hřibobraní — ber košík 🧺';
  if(s>=70) return 'Roste! Stojí to za výpravu';
  if(s>=50) return 'Slušné, něco najdeš';
  if(s>=25) return 'Slabé — spíš na procházku';
  return 'Sucho, zůstaň doma';
}

// colour ramp: red (dry) → orange → yellow → green-yellow → green (mushroom weather)
const RAMP=[[0,'#c0392b'],[25,'#e67e22'],[50,'#f1c40f'],[70,'#8bc34a'],[85,'#27ae60'],[100,'#1e8449']];
function colour(s){
  for(let i=1;i<RAMP.length;i++){
    if(s<=RAMP[i][0]){
      const [a,ca]=RAMP[i-1],[b,cb]=RAMP[i],t=(s-a)/(b-a);
      const h=c=>parseInt(c,16);
      const mix=(x,y)=>Math.round(h(x)+(h(y)-h(x))*t).toString(16).padStart(2,'0');
      return '#'+mix(ca.slice(1,3),cb.slice(1,3))+mix(ca.slice(3,5),cb.slice(3,5))+mix(ca.slice(5,7),cb.slice(5,7));
    }
  }
  return RAMP.at(-1)[1];
}

/* ================= map + UI ================= */
const map=new maplibregl.Map({
  container:'map',
  style:'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  center:[15.47,49.82], zoom:6.6, minZoom:5.5, maxZoom:10,
  attributionControl:{compact:true}
});
map.addControl(new maplibregl.NavigationControl({showCompass:false}),'top-right');

let DATA=null, dayOffset=0; // 0 = today

function buildGeoJSON(){
  const feats=points.map((p,i)=>{
    const loc=DATA[i];
    const D=PAST+dayOffset;
    const r=score(loc,D);
    return {type:'Feature',
      geometry:{type:'Polygon',coordinates:hexCoords(p)},
      properties:{score:r.s,color:colour(r.s),rain:r.rain,sm:+(r.sm*100).toFixed(0),tm:r.tm}};
  });
  return {type:'FeatureCollection',features:feats};
}

function refresh(){
  const gj=buildGeoJSON();
  const src=map.getSource('hex');
  if(src) src.setData(gj);
  else{
    map.addSource('hex',{type:'geojson',data:gj});
    map.addLayer({id:'hex-fill',type:'fill',source:'hex',
      paint:{'fill-color':['get','color'],'fill-opacity':0.55}});
    map.addLayer({id:'hex-line',type:'line',source:'hex',
      paint:{'line-color':'#171a12','line-width':0.8,'line-opacity':0.6}});
    map.on('click','hex-fill',e=>{
      const f=e.features[0].properties;
      new maplibregl.Popup({closeButton:true,maxWidth:'280px'})
        .setLngLat(e.lngLat)
        .setHTML(`<div class="pp-score" style="color:${colour(f.score)}">${f.score}</div>
          <div class="pp-verdict">${verdict(f.score)}</div>
          <div class="pp-row"><span>Srážkový impuls (14 d, vážený)</span><b>${f.rain} mm</b></div>
          <div class="pp-row"><span>Půdní vlhkost 0–7 cm</span><b>${f.sm} %</b></div>
          <div class="pp-row"><span>Průměrná teplota</span><b>${f.tm} °C</b></div>`)
        .addTo(map);
    });
    map.on('mouseenter','hex-fill',()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave','hex-fill',()=>map.getCanvas().style.cursor='');
  }
}

function buildDayChips(){
  const el=document.getElementById('days');
  const names=['Ne','Po','Út','St','Čt','Pá','So'];
  const today=new Date();
  el.innerHTML='';
  for(let d=0;d<FUT;d++){
    const dt=new Date(today); dt.setDate(dt.getDate()+d);
    const dow=dt.getDay();
    const b=document.createElement('button');
    b.className='day'+(d===dayOffset?' on':'');
    b.innerHTML=(d===0?'Dnes':d===1?'Zítra':names[dow])
      +`<small>${dt.getDate()}.${dt.getMonth()+1}.</small>`;
    b.onclick=()=>{dayOffset=d;buildDayChips();refresh();};
    el.appendChild(b);
  }
}

// legend fold toggle
function initLegendToggle(){
  const t=document.getElementById('legendToggle');
  const l=document.getElementById('legend');
  const toggle=()=>{
    const open=!t.classList.contains('open');
    t.classList.toggle('open',open);
    l.classList.toggle('open',open);
    t.setAttribute('aria-expanded',open?'true':'false');
  };
  t.addEventListener('click',toggle);
  t.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}});
}
initLegendToggle();

(async()=>{
  buildDayChips();
  try{
    DATA=await fetchAll();
    statusEl.textContent=`${points.length} bodů · data Open-Meteo · aktualizováno ${new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'})}`;
    if(map.loaded()) refresh(); else map.on('load',refresh);
  }catch(err){
    statusEl.className='status err';
    statusEl.textContent='Nepodařilo se načíst data: '+err.message+' — zkus obnovit stránku.';
  }
})();
</script>
</body>
</html>
