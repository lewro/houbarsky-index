<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Houbařský index — kde teď rostou houby</title>
<meta name="description" content="Mapa podmínek pro růst hub v Česku. Počítáno ze srážek, půdní vlhkosti a teplot.">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Houby">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,500;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --humus:#171a12;        /* forest-floor background */
    --panel:#20241a;
    --panel-edge:#33382a;
    --moss:#8fae57;
    --cap:#e0a83c;          /* chanterelle amber — the "it's good" colour */
    --ink:#e8e6da;
    --ink-dim:#a9a795;
    --ink-faint:#6f6e5f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--humus);color:var(--ink);
    font-family:'Instrument Sans',system-ui,sans-serif;overflow:hidden}
  #map{position:absolute;inset:0}

  /* ---------- floating panel ---------- */
  .panel{
    position:absolute;top:14px;left:14px;z-index:10;
    background:#000;color:#fff;
    border:1px solid #000;border-radius:14px;
    padding:16px 18px 14px;width:360px;max-width:calc(100vw - 28px);
    box-shadow:0 8px 30px rgba(0,0,0,.45);
  }
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:300;
    font-size:1.45rem;line-height:1.05;letter-spacing:-.01em;color:#fff}
  .sub{font-size:.78rem;color:#a9a9a9;margin-top:5px;line-height:1.45}

  .days{display:flex;gap:4px;margin-top:13px;flex-wrap:nowrap}
  .day{
    font:500 .72rem 'Instrument Sans',sans-serif;color:#fff;
    background:#333;border:1px solid #333;
    border-radius:8px;padding:5px 4px;cursor:pointer;
    transition:all .15s ease;
    flex:1 1 0;min-width:0;text-align:center;
  }
  .day:hover{background:#444;border-color:#555}
  .day.on{background:#fff;border-color:#fff;color:#000}
  .day small{display:block;font-weight:400;font-size:.6rem;opacity:.75;margin-top:1px}

  .status{margin-top:11px;font-size:.74rem;color:#fff;opacity:.6}
  .status.err{color:#e57a5a;opacity:1}

  /* ---------- legend (inside panel, foldable) ---------- */
  .legend-toggle{
    margin-top:12px;padding:8px 0 0;
    border-top:1px solid #333;
    font-size:.74rem;color:#fff;cursor:pointer;
    display:flex;justify-content:space-between;align-items:center;
    user-select:none;
  }
  .legend-toggle .chev{transition:transform .2s ease;font-size:.8rem;opacity:.75}
  .legend-toggle.open .chev{transform:rotate(180deg)}
  .legend{
    max-height:0;overflow:hidden;
    transition:max-height .25s ease;
    font-size:.72rem;
  }
  .legend.open{max-height:200px;padding-top:6px}
  .legend .row{display:flex;align-items:center;gap:8px;margin:3px 0}
  .legend .sw{width:15px;height:15px;border-radius:4px;flex:none}
  .legend .lbl{color:#fff;opacity:.85}
  .legend .lbl b{opacity:1;font-weight:600}

  /* ---------- popup ---------- */
  .maplibregl-popup-content{
    background:#000;color:#fff;border:1px solid #333;
    border-radius:12px;padding:14px 16px;font-family:'Instrument Sans',sans-serif;
    box-shadow:0 10px 34px rgba(0,0,0,.5);min-width:225px;
  }
  .maplibregl-popup-tip{border-top-color:#000!important;border-bottom-color:#000!important}
  .maplibregl-popup-close-button{color:#fff;opacity:.6;font-size:18px;right:6px;top:4px}
  .maplibregl-popup-close-button:hover{opacity:1;background:transparent}
  .pp-score{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:2rem;line-height:1}
  .pp-verdict{font-weight:600;font-size:.85rem;margin:2px 0 9px;color:#fff}
  .pp-row{display:flex;justify-content:space-between;gap:14px;font-size:.76rem;
    color:rgba(255,255,255,.6);padding:3px 0;border-top:1px solid #333}
  .pp-row b{color:#fff;font-weight:600;white-space:nowrap}

  /* ---------- user pin marker (geolocation + search) ---------- */
  .user-pin{cursor:pointer;display:block;line-height:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}

  /* ---------- directions popup ---------- */
  .dir-title{font-weight:600;font-size:.82rem;margin-bottom:9px;color:#fff}
  .dir-btns{display:flex;gap:5px}
  .dir-btn{flex:1;background:#111;color:#fff;padding:9px 6px;border:1px solid #333;
    border-radius:8px;text-decoration:none;text-align:center;
    font:500 .74rem 'Instrument Sans',sans-serif;transition:background .1s}
  .dir-btn:hover{background:#222;border-color:#555}

  /* ---------- custom map controls (locate + search) ---------- */
  .ctrl-btn{
    background:#000;color:#fff;border:none;
    width:29px;height:29px;padding:0;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .ctrl-btn:hover{background:#222}
  .ctrl-btn:focus-visible{outline:1px solid #fff;outline-offset:-2px}
  .maplibregl-ctrl-group.hix-ctrl{background:#000;border:1px solid #000;box-shadow:0 4px 14px rgba(0,0,0,.45)}
  .maplibregl-ctrl-group.hix-ctrl button+button{border-top:1px solid #333}

  /* search overlay dropped from the top */
  .search-overlay{
    position:absolute;top:14px;left:50%;transform:translateX(-50%) translateY(-8px);
    background:#000;color:#fff;border:1px solid #333;border-radius:14px;
    padding:10px;width:min(360px,calc(100vw - 28px));z-index:9;
    opacity:0;pointer-events:none;transition:opacity .15s ease, transform .15s ease;
    display:flex;flex-direction:column;gap:6px;
    box-shadow:0 8px 30px rgba(0,0,0,.45);
  }
  .search-overlay.open{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
  .search-overlay input{
    background:#111;color:#fff;border:1px solid #333;border-radius:8px;
    padding:9px 11px;font:500 .82rem 'Instrument Sans',sans-serif;outline:none;
  }
  .search-overlay input:focus{border-color:#666}
  .search-item{
    display:block;width:100%;text-align:left;background:transparent;color:#fff;
    border:none;padding:7px 9px;border-radius:6px;cursor:pointer;
    font:400 .75rem 'Instrument Sans',sans-serif;line-height:1.35;
  }
  .search-item:hover,.search-item:focus-visible{background:#222;outline:none}
  #searchResults:not(:empty){margin-top:2px}

  @media (max-width:560px){
    .panel{width:calc(100vw - 28px);padding:14px 14px 12px}
    .days{gap:3px}
    .day{padding:5px 2px;font-size:.66rem}
    .day small{font-size:.54rem}
    .legend{font-size:.68rem}
    /* on mobile the search dropdown lives above the bottom-right control stack */
    .search-overlay{top:auto;bottom:150px;transform:translateX(-50%) translateY(8px)}
    .search-overlay.open{transform:translateX(-50%) translateY(0)}
  }
  @media (prefers-reduced-motion: reduce){
    .day{transition:none}
  }
</style>
</head>
<body>
<div id="map"></div>

<div class="panel">
  <h1>Houbařský<br>index</h1>
  <div class="sub">Kde v Česku teď rostou houby — počítáno ze srážek posledních 14&nbsp;dní, půdní vlhkosti a teplot.</div>
  <div class="days" id="days"></div>
  <div class="status" id="status">Načítám data…</div>
  <div class="legend-toggle" id="legendToggle" role="button" tabindex="0" aria-expanded="false" aria-controls="legend">
    <span>Legenda</span><span class="chev">▾</span>
  </div>
  <div class="legend" id="legend">
    <div class="row"><span class="sw" style="background:#7f1d1d"></span><span class="lbl"><b>0–25</b> Sucho, zůstaň doma</span></div>
    <div class="row"><span class="sw" style="background:#ea580c"></span><span class="lbl"><b>25–50</b> Slabé, spíš procházka</span></div>
    <div class="row"><span class="sw" style="background:#facc15"></span><span class="lbl"><b>50–70</b> Slušné podmínky</span></div>
    <div class="row"><span class="sw" style="background:#a3e635"></span><span class="lbl"><b>70–85</b> Roste!</span></div>
    <div class="row"><span class="sw" style="background:#16a34a"></span><span class="lbl"><b>85+</b> Hřibobraní 🧺</span></div>
  </div>
</div>

<script>
/* ================= grid over ČR ================= */
// The honeycomb grid and all Open-Meteo data are precomputed daily by
// scripts/build_data.py (GitHub Actions cron) and shipped as a static data.json.
// The page makes ZERO live API calls — this avoids Open-Meteo's ~600-calls/min
// limit that a dense client-side grid was tripping (blank map in production).
// `points` (lon/lat per hex) and the hex radii are populated from data.json.
let LON_STEP=0.105, LAT_STEP=0.0675;              // defaults; overwritten from data.json
let R_LON=LON_STEP/Math.sqrt(3)*1.02, R_LAT=LAT_STEP/1.5*1.02; // hex radii (deg), tiny overlap
let points=[];

function hexCoords(p){
  const c=[];
  for(let k=0;k<6;k++){
    const a=Math.PI/6+k*Math.PI/3;
    c.push([p.lon+R_LON*Math.cos(a), p.lat+R_LAT*Math.sin(a)]);
  }
  c.push(c[0]);
  return [c];
}

/* ================= data load ================= */
// PAST/FUT come from data.json (index PAST == "today"); keep defaults as fallback.
let PAST=14, FUT=7;
const statusEl=document.getElementById('status');

// Read the precomputed static payload. Populates `points`, grid steps and radii,
// and returns the per-point compact arrays index-aligned to `points`.
async function fetchAll(){
  const r=await fetch('data.json?v='+new Date().toISOString().slice(0,10),{cache:'no-cache'});
  if(!r.ok) throw new Error('data.json '+r.status);
  const doc=await r.json();
  if(!doc||!Array.isArray(doc.points)||!doc.points.length) throw new Error('data.json prázdná nebo neplatná');
  if(typeof doc.past==='number') PAST=doc.past;
  if(typeof doc.fut==='number')  FUT=doc.fut;
  if(doc.lon_step) LON_STEP=doc.lon_step;
  if(doc.lat_step) LAT_STEP=doc.lat_step;
  R_LON=LON_STEP/Math.sqrt(3)*1.02; R_LAT=LAT_STEP/1.5*1.02;
  points=doc.points.map(p=>({lon:p.lon,lat:p.lat}));
  return doc.points.map(p=>({prcp:p.prcp,tmax:p.tmax,tmin:p.tmin,soil:p.soil}));
}

/* ================= scoring ================= */
// lag weight: fruiting follows rain by ~5–10 days
function lagW(lag){
  if(lag<0) return 0;
  if(lag<=2) return .25;
  if(lag<=4) return .65;
  if(lag<=10) return 1.0;
  if(lag<=14) return .45;
  return 0;
}
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));

// score for one location on day index D (0..PAST+FUT-1); "today" = PAST
function score(loc, D){
  // 1) rain trigger — weighted rain over the 14 days before D (forecast rain counts for future D)
  let rain=0;
  for(let d=Math.max(0,D-14); d<=D; d++){
    const p=loc.prcp[d]; if(p!=null) rain+=p*lagW(D-d);
  }
  const rainS=clamp(Math.sqrt(rain/32),0,1); // ~32mm weighted ≈ saturated

  // 2) soil moisture around D (0–7 cm, m³/m³)
  let sm=0,n=0;
  for(let d=Math.max(0,D-1); d<=Math.min(loc.soil.length-1,D); d++){
    if(loc.soil[d]!=null){sm+=loc.soil[d];n++;}
  }
  sm=n?sm/n:0.18;
  const soilS=clamp((sm-0.13)/(0.30-0.13),0,1);

  // 3) temperature D-2..D — sweet spot 11–19 °C mean
  let tm=0,tn=0,frost=false,heat=false;
  for(let d=Math.max(0,D-2); d<=D; d++){
    if(loc.tmax[d]!=null&&loc.tmin[d]!=null){
      tm+=(loc.tmax[d]+loc.tmin[d])/2; tn++;
      if(loc.tmin[d]<0.5) frost=true;
      if(loc.tmax[d]>29) heat=true;
    }
  }
  tm=tn?tm/tn:14;
  let tempS;
  if(tm>=11&&tm<=19) tempS=1;
  else if(tm<11) tempS=clamp((tm-3)/8,0,1);
  else tempS=clamp((27-tm)/8,0,1);

  let s=100*(0.45*rainS+0.35*soilS+0.20*tempS);
  if(frost) s*=0.5;
  if(heat)  s*=0.8;
  // dry snap: nothing fell in last 3 days and it's hot → surface dries out
  let dry3=0;
  for(let d=Math.max(0,D-2);d<=D;d++) dry3+=loc.prcp[d]||0;
  if(dry3<0.5 && tm>22) s*=0.85;

  return {s:Math.round(clamp(s,0,100)), rain:Math.round(rain), sm, tm:Math.round(tm*10)/10};
}

function verdict(s){
  if(s>=85) return 'Hřibobraní — ber košík 🧺';
  if(s>=70) return 'Roste! Stojí to za výpravu';
  if(s>=50) return 'Slušné, něco najdeš';
  if(s>=25) return 'Slabé — spíš na procházku';
  return 'Sucho, zůstaň doma';
}

// colour ramp: red (dry) → orange → yellow → chartreuse → green → deep green
// tuned for high step-to-step contrast so the map reads at a glance
const RAMP=[[0,'#7f1d1d'],[25,'#ea580c'],[50,'#facc15'],[70,'#a3e635'],[85,'#16a34a'],[100,'#052e16']];
function colour(s){
  for(let i=1;i<RAMP.length;i++){
    if(s<=RAMP[i][0]){
      const [a,ca]=RAMP[i-1],[b,cb]=RAMP[i],t=(s-a)/(b-a);
      const h=c=>parseInt(c,16);
      const mix=(x,y)=>Math.round(h(x)+(h(y)-h(x))*t).toString(16).padStart(2,'0');
      return '#'+mix(ca.slice(1,3),cb.slice(1,3))+mix(ca.slice(3,5),cb.slice(3,5))+mix(ca.slice(5,7),cb.slice(5,7));
    }
  }
  return RAMP.at(-1)[1];
}

/* ================= map + UI ================= */
const map=new maplibregl.Map({
  container:'map',
  style:'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  center:[15.47,49.82], zoom:6.6, minZoom:5.5, maxZoom:10,
  attributionControl:{compact:true}
});
map.addControl(new maplibregl.NavigationControl({showCompass:false}),'bottom-right');

/* ---------- locate-me + search custom controls ---------- */
class HixControl{
  constructor(opts){this._opts=opts}
  onAdd(map){
    this._map=map;
    const c=this._container=document.createElement('div');
    c.className='maplibregl-ctrl maplibregl-ctrl-group hix-ctrl';
    const b=document.createElement('button');
    b.type='button';
    b.className='ctrl-btn';
    b.title=this._opts.title;
    b.setAttribute('aria-label',this._opts.title);
    b.innerHTML=this._opts.icon;
    b.onclick=e=>{e.preventDefault();this._opts.onClick(map,b);};
    c.appendChild(b);
    return c;
  }
  onRemove(){this._container.remove();this._map=null;}
}

const ICON_LOCATE='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>';
const ICON_SEARCH='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';

/* one shared user pin (from geolocation or search); replaced when a new drop happens */
let userPin=null;
function makePinEl(){
  const el=document.createElement('div');
  el.className='user-pin';
  el.innerHTML='<svg width="26" height="34" viewBox="0 0 26 34" xmlns="http://www.w3.org/2000/svg" aria-label="Vybraný bod"><path d="M13 1C6.4 1 1 6.4 1 13c0 8.5 12 20 12 20s12-11.5 12-20c0-6.6-5.4-12-12-12z" fill="#ffffff" stroke="#000000" stroke-width="1.5"/><circle cx="13" cy="13" r="4" fill="#000000"/></svg>';
  return el;
}
function dropUserPin(lon,lat){
  if(userPin) userPin.remove();
  const el=makePinEl();
  el.addEventListener('click',ev=>{
    ev.stopPropagation();
    showDirectionsPopup([lon,lat]);
  });
  userPin=new maplibregl.Marker({element:el,anchor:'bottom'}).setLngLat([lon,lat]).addTo(map);
}

map.addControl(new HixControl({title:'Moje poloha',icon:ICON_LOCATE,onClick:(m,b)=>{
  if(!navigator.geolocation){statusEl.textContent='Geolokace není v tomto prohlížeči podporována.';return;}
  b.disabled=true;
  navigator.geolocation.getCurrentPosition(
    pos=>{
      b.disabled=false;
      const {longitude:lon,latitude:lat}=pos.coords;
      m.flyTo({center:[lon,lat],zoom:m.getMaxZoom(),essential:true});
      dropUserPin(lon,lat);
    },
    err=>{
      b.disabled=false;
      statusEl.textContent='Nepodařilo se získat polohu: '+(err.message||'zamítnuto').toLowerCase();
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
  );
}}),'bottom-right');

/* search: dropdown overlay with debounced Nominatim geocoding */
const searchOverlay=document.createElement('div');
searchOverlay.className='search-overlay';
searchOverlay.innerHTML='<input type="search" id="searchInput" placeholder="Hledat obec, město…" autocomplete="off" spellcheck="false" enterkeyhint="search"><div id="searchResults"></div>';
document.body.appendChild(searchOverlay);
const searchInput=searchOverlay.querySelector('#searchInput');
const searchResults=searchOverlay.querySelector('#searchResults');
let searchAbort=null,searchDeb=null;
async function doSearch(){
  const q=searchInput.value.trim();
  if(searchAbort)searchAbort.abort();
  if(q.length<2){searchResults.innerHTML='';return;}
  searchAbort=new AbortController();
  try{
    const url='https://nominatim.openstreetmap.org/search?format=json&limit=5&countrycodes=cz&q='+encodeURIComponent(q);
    const r=await fetch(url,{signal:searchAbort.signal,headers:{'Accept-Language':'cs'}});
    if(!r.ok)return;
    const items=await r.json();
    searchResults.innerHTML=items.map(it=>{
      const label=(it.display_name||'').replace(/</g,'&lt;');
      return `<button type="button" class="search-item" data-lat="${it.lat}" data-lon="${it.lon}">${label}</button>`;
    }).join('');
    searchResults.querySelectorAll('.search-item').forEach(el=>{
      el.onclick=()=>{
        const lon=+el.dataset.lon, lat=+el.dataset.lat;
        map.flyTo({center:[lon,lat],zoom:map.getMaxZoom(),essential:true});
        dropUserPin(lon,lat);
        closeSearch();
      };
    });
  }catch(e){if(e.name!=='AbortError')/* silent */; }
}
function openSearch(){searchOverlay.classList.add('open');setTimeout(()=>searchInput.focus(),0);}
function closeSearch(){searchOverlay.classList.remove('open');searchInput.blur();}
searchInput.addEventListener('input',()=>{clearTimeout(searchDeb);searchDeb=setTimeout(doSearch,250);});
searchInput.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeSearch();
  else if(e.key==='Enter'){e.preventDefault();doSearch();}
});
document.addEventListener('click',e=>{
  if(!searchOverlay.classList.contains('open'))return;
  if(searchOverlay.contains(e.target))return;
  // ignore clicks on the search control button itself (it toggles)
  if(e.target.closest('button')?.getAttribute('aria-label')==='Hledat')return;
  closeSearch();
});

map.addControl(new HixControl({title:'Hledat',icon:ICON_SEARCH,onClick:()=>{
  if(searchOverlay.classList.contains('open'))closeSearch();
  else openSearch();
}}),'bottom-right');

let DATA=null, dayOffset=0; // 0 = today

/* transient drill-in state (runtime only — never baked into cached fetchAll payload) */
let selectedIdx=-1;
let infoPopup=null;
let dirPopup=null;

function buildGeoJSON(){
  const feats=points.map((p,i)=>{
    const loc=DATA[i];
    const D=PAST+dayOffset;
    const r=score(loc,D);
    return {type:'Feature', id:i,
      geometry:{type:'Polygon',coordinates:hexCoords(p)},
      properties:{score:r.s,color:colour(r.s),rain:r.rain,sm:+(r.sm*100).toFixed(0),tm:r.tm}};
  });
  return {type:'FeatureCollection',features:feats};
}

function hexBounds(p){
  return [[p.lon-R_LON, p.lat-R_LAT], [p.lon+R_LON, p.lat+R_LAT]];
}

/* iOS detection for platform-native directions deeplink */
const IS_IOS=/iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
function directionsUrl(lat,lng,mode){
  if(IS_IOS){
    const dirflg=mode==='transit'?'r':mode==='walking'?'w':'d';
    return `maps://?daddr=${lat},${lng}&dirflg=${dirflg}`;
  }
  return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=${mode}`;
}

function showDirectionsPopup(lngLat){
  if(dirPopup){dirPopup.remove();dirPopup=null;}
  const lng=Array.isArray(lngLat)?lngLat[0]:lngLat.lng;
  const lat=Array.isArray(lngLat)?lngLat[1]:lngLat.lat;
  dirPopup=new maplibregl.Popup({closeButton:true,maxWidth:'280px',anchor:'bottom',offset:12})
    .setLngLat([lng,lat])
    .setHTML(`<div class="dir-title">Navigovat sem</div>
      <div class="dir-btns">
        <a class="dir-btn" href="${directionsUrl(lat,lng,'driving')}" target="_blank" rel="noopener">Autem</a>
        <a class="dir-btn" href="${directionsUrl(lat,lng,'transit')}" target="_blank" rel="noopener">MHD</a>
        <a class="dir-btn" href="${directionsUrl(lat,lng,'walking')}" target="_blank" rel="noopener">Pěšky</a>
      </div>`)
    .addTo(map);
  dirPopup.on('close',()=>{dirPopup=null;});
}

function drillIn(idx){
  if(selectedIdx===idx) return;
  // clear previous selection state
  if(selectedIdx>=0) map.setFeatureState({source:'hex',id:selectedIdx},{selected:false});
  if(dirPopup){dirPopup.remove();dirPopup=null;}
  if(infoPopup){infoPopup.remove();infoPopup=null;}
  selectedIdx=idx;
  map.setFeatureState({source:'hex',id:idx},{selected:true});
  const p=points[idx];
  // zoom to the hex with generous top padding so the popup sits above it, not over the interior
  map.fitBounds(hexBounds(p),{padding:{top:200,bottom:40,left:40,right:40},maxZoom:map.getMaxZoom(),essential:true});
  // popup anchored at the top edge of the hex so it appears above and doesn't block the interior
  const r=score(DATA[idx], PAST+dayOffset);
  const smPct=+(r.sm*100).toFixed(0);
  infoPopup=new maplibregl.Popup({closeButton:true,maxWidth:'280px',anchor:'bottom',offset:8})
    .setLngLat([p.lon, p.lat + R_LAT])
    .setHTML(`<div class="pp-score" style="color:${colour(r.s)}">${r.s}</div>
      <div class="pp-verdict">${verdict(r.s)}</div>
      <div class="pp-row"><span>Srážkový impuls (14 d, vážený)</span><b>${r.rain} mm</b></div>
      <div class="pp-row"><span>Půdní vlhkost 0–7 cm</span><b>${smPct} %</b></div>
      <div class="pp-row"><span>Průměrná teplota</span><b>${r.tm} °C</b></div>`)
    .addTo(map);
  infoPopup.on('close',()=>{
    // popup close is one of the exit affordances
    if(selectedIdx===idx) exitDrillIn();
  });
}

function exitDrillIn(){
  if(selectedIdx>=0){
    map.setFeatureState({source:'hex',id:selectedIdx},{selected:false});
    selectedIdx=-1;
  }
  if(infoPopup){const p=infoPopup;infoPopup=null;p.remove();}
  if(dirPopup){const p=dirPopup;dirPopup=null;p.remove();}
}

function refresh(){
  const gj=buildGeoJSON();
  const src=map.getSource('hex');
  if(src) src.setData(gj);
  else{
    map.addSource('hex',{type:'geojson',data:gj});
    map.addLayer({id:'hex-fill',type:'fill',source:'hex',
      paint:{
        'fill-color':['get','color'],
        // transparent when drilled in so the underlying basemap shows through
        'fill-opacity':['case',['boolean',['feature-state','selected'],false], 0, 0.78]
      }});
    map.addLayer({id:'hex-line',type:'line',source:'hex',
      paint:{
        // thicker, brighter border when the hex is drilled in
        'line-color':['case',['boolean',['feature-state','selected'],false], '#ffffff', '#171a12'],
        'line-width':['case',['boolean',['feature-state','selected'],false], 5, 0.8],
        'line-opacity':['case',['boolean',['feature-state','selected'],false], 1, 0.6]
      }});
    map.on('click','hex-fill',e=>{
      const idx=e.features[0].id;
      if(idx===selectedIdx){
        // click INSIDE the already-drilled hex → show directions at click point
        showDirectionsPopup(e.lngLat);
      }else{
        // drill in (or switch drill-in to another hex)
        drillIn(idx);
      }
    });
    // click outside any hex (e.g. Slovak side of the border, sea, gutter) exits drill-in
    map.on('click',e=>{
      if(selectedIdx<0) return;
      const hits=map.queryRenderedFeatures(e.point,{layers:['hex-fill']});
      if(hits.length===0) exitDrillIn();
    });
    // ESC as a keyboard exit affordance
    document.addEventListener('keydown',e=>{
      if(e.key==='Escape' && selectedIdx>=0) exitDrillIn();
    });
    map.on('mouseenter','hex-fill',()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave','hex-fill',()=>map.getCanvas().style.cursor='');
  }
}

function buildDayChips(){
  const el=document.getElementById('days');
  const names=['Ne','Po','Út','St','Čt','Pá','So'];
  const today=new Date();
  el.innerHTML='';
  for(let d=0;d<FUT;d++){
    const dt=new Date(today); dt.setDate(dt.getDate()+d);
    const dow=dt.getDay();
    const b=document.createElement('button');
    b.className='day'+(d===dayOffset?' on':'');
    b.innerHTML=(d===0?'Dnes':d===1?'Zítra':names[dow])
      +`<small>${dt.getDate()}.${dt.getMonth()+1}.</small>`;
    b.onclick=()=>{dayOffset=d;exitDrillIn();buildDayChips();refresh();};
    el.appendChild(b);
  }
}

// legend fold toggle
function initLegendToggle(){
  const t=document.getElementById('legendToggle');
  const l=document.getElementById('legend');
  const toggle=()=>{
    const open=!t.classList.contains('open');
    t.classList.toggle('open',open);
    l.classList.toggle('open',open);
    t.setAttribute('aria-expanded',open?'true':'false');
  };
  t.addEventListener('click',toggle);
  t.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}});
}
initLegendToggle();

(async()=>{
  try{
    DATA=await fetchAll();
    buildDayChips(); // after fetch so PAST/FUT from data.json are in effect
    statusEl.textContent=`${points.length} bodů · data Open-Meteo · aktualizováno ${new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'})}`;
    if(map.loaded()) refresh(); else map.on('load',refresh);
  }catch(err){
    buildDayChips();
    statusEl.className='status err';
    statusEl.textContent='Nepodařilo se načíst data: '+err.message+' — zkus obnovit stránku.';
  }
})();
</script>
